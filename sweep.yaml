program: train.py
method: bayes

metric:
  name: val_accuracy
  goal: maximize

parameters:
  dataset:
    value: fashion_mnist

  epochs:
    value: 15

  batch_size:
    values: [32, 64, 128]

  loss:
    values: [cross_entropy, mean_squared_error]

  optimizer:
    values: [sgd, momentum, nag, rmsprop, adam, nadam]

  learning_rate:
    distribution: log_uniform_values
    min: 0.0001
    max: 0.1

  weight_decay:
    values: [0.0, 0.0005, 0.005]

  num_layers:
    values: [2, 3, 4]

  hidden_size:
    values: [64, 128]

  activation:
    values: [sigmoid, tanh, relu]

  weight_init:
    values: [random, xavier]
